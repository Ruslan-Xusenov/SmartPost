version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: smartpost-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartpost
      POSTGRES_USER: smartpost
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartpost_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpost"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: smartpost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (Go) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpost-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://smartpost:${DB_PASSWORD:-smartpost_pass}@postgres:5432/smartpost?sslmode=disable
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (SolidJS) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartpost-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  # ── Nginx (Reverse Proxy) ──
  nginx:
    image: nginx:alpine
    container_name: smartpost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
